<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LSCM — Workflow Bout-en-Bout</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#07080C;color:#e0e0e0;height:100vh;overflow:hidden;position:relative}
.grid{position:fixed;inset:0;opacity:.02;pointer-events:none;background-image:linear-gradient(#F5A80055 1px,transparent 1px),linear-gradient(90deg,#F5A80055 1px,transparent 1px);background-size:100px 100px}
.header{position:absolute;top:0;left:0;right:0;padding:14px 28px;display:flex;justify-content:space-between;align-items:center;z-index:20}
.logo{color:#F5A800;font-weight:800;font-size:13px;letter-spacing:3px}
.btn{padding:8px 20px;border-radius:8px;border:none;background:#F5A800;color:#000;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit}
.dots{position:absolute;top:56px;left:0;right:0;display:flex;justify-content:center;gap:4px;z-index:20}
.dot{height:6px;border-radius:3px;transition:all .3s ease}
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .5s ease;padding:20px}
.scene-icon{font-size:80px;margin-bottom:20px;animation:iconFloat 3s ease infinite}
.scene-sub{font-size:12px;font-weight:700;letter-spacing:3px;margin-bottom:8px}
.scene-name{font-size:min(42px,7vw);font-weight:900;text-align:center;max-width:800px;margin-bottom:20px}
.scene-caption{font-size:min(20px,4vw);line-height:1.7;text-align:center;max-width:700px;color:#ccc}
.scene-count{margin-top:30px;font-size:12px;color:#555}
.gl-badge{margin-bottom:16px;font-size:11px;font-weight:700;color:#EF4444;background:#EF444422;border:1px solid #EF444433;padding:4px 14px;border-radius:20px;display:inline-block}
.progress{position:absolute;bottom:0;left:0;right:0;height:4px;background:#ffffff08;z-index:20}
.progress-fill{height:4px;transition:width .5s ease}
.main-name{color:#EF4444;text-shadow:0 0 40px rgba(239,68,68,.4)}
@keyframes iconFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .5s ease both}
.fade-in-d1{animation:fadeIn .5s ease .2s both}
.fade-in-d2{animation:fadeIn .5s ease .4s both}
.fade-in-d3{animation:fadeIn .5s ease .6s both}
</style>
</head>
<body>
<div class="grid"></div>
<div class="header">
  <span class="logo">LSCM Ltd</span>
  <button class="btn" id="playBtn" onclick="startPlay()">▶ Lancer (2 min)</button>
</div>
<div class="dots" id="dots"></div>
<div class="scene" id="scene"></div>
<div class="progress"><div class="progress-fill" id="progressBar"></div></div>

<script>
const SCENES=[
{icon:"📋",name:"Demande de Collecte",sub:"APPROVISIONNEMENT",color:"#3B82F6",caption:"Chaque parcours commence par une demande client. CLEAR crée le job, identifie le pays d'origine et planifie l'itinéraire complet.",bg:"0A1628"},
{icon:"📊",name:"Import Données SAP",sub:"APPROVISIONNEMENT",color:"#3B82F6",caption:"Les lignes de commande arrivent depuis SAP. Chaque article reçoit un QR code unique — son passeport digital pour toute la chaîne.",bg:"0A1628"},
{icon:"🚚",name:"Enlèvement Mondial",sub:"COLLECTE",color:"#8B5CF6",caption:"Nos agents collectent chez les fournisseurs du monde entier. Europe, États-Unis, Chine, Inde, EAU — nous sommes là.",bg:"12082A"},
{icon:"📑",name:"Déclaration Export",sub:"DOUANES ORIGINE",color:"#8B5CF6",caption:"Les exigences export varient par pays. EUR.1 pour l'Europe. AES/EEI pour les USA. CIQ pour la Chine.",bg:"12082A",gl:true},
{icon:"🌍",name:"Origine vers Hub",sub:"TRANSIT GLOBAL",color:"#6366F1",caption:"De toute origine vers notre hub européen. Fret maritime, cargo aérien ou transport routier. Chaque corridor a ses procédures.",bg:"0E0A28"},
{icon:"📦",name:"Réception Hub",sub:"WMS — HUB LSCM",color:"#F59E0B",caption:"Les articles de tous horizons convergent. Le scan QR valide chacun. Marchandises sous douane et dédouanées séparées.",bg:"1A1408"},
{icon:"🗄️",name:"Stockage & Inventaire",sub:"WMS — HUB LSCM",color:"#F59E0B",caption:"Assignation zone intelligente. Inventaires continus. FIFO appliqué. Alertes réapprovisionnement. Digest hebdo CEO.",bg:"1A1408"},
{icon:"🧩",name:"Consolidation Multi-Origine",sub:"WMS — HUB LSCM",color:"#F59E0B",caption:"Les commandes d'Europe, USA et Asie sont fusionnées en envois optimaux. L'IA recommande le meilleur groupage.",bg:"1A1408"},
{icon:"📐",name:"Picking, Packing & Étiquetage",sub:"WMS — HUB LSCM",color:"#F59E0B",caption:"Prélèvement route optimale. Articles emballés en cartons, caisses, conteneurs. Listes colisage par origine.",bg:"1A1408"},
{icon:"⚡",name:"GREEN LIGHT PRINCIPAL",sub:"PORTE CRITIQUE",color:"#EF4444",caption:"Le moment de vérité. Le dossier documentaire complet part au réceptionnaire. Rien ne bouge sans son accord.",bg:"1A0808",main:true,gl:true},
{icon:"🏗️",name:"Chargement & Expédition",sub:"WMS — HUB LSCM",color:"#F59E0B",caption:"Chaque colis scanné sur le conteneur. Vérification 100%. Scellé enregistré. Preuve photo. Départ vers le port.",bg:"1A1408"},
{icon:"⚓",name:"Port de Départ",sub:"EXPORT",color:"#0EA5E9",caption:"Conteneur présenté aux douanes portuaires. Tous les certificats soumis. Douanes approuvent. BL ou LTA émis.",bg:"081420",gl:true},
{icon:"🚢",name:"Transit International",sub:"TRANSPORT",color:"#06B6D4",caption:"Traversée des océans et des frontières. Suivi temps réel à chaque kilomètre. Déclarations transit à chaque passage.",bg:"081A1E"},
{icon:"🛃",name:"Douanes Import",sub:"PORT DESTINATION",color:"#14B8A6",caption:"Le Nigeria exige Form M, PAAR et SON. La Mauritanie exige le BIVAC. Droits calculés avec tarifs préférentiels.",bg:"081A14",gl:true},
{icon:"🏭",name:"Entrepôt Destination",sub:"WMS — DESTINATION",color:"#EC4899",caption:"WMS complet à destination. Réception QR, contrôle état, stockage par zone client. Accès portail temps réel.",bg:"1A0818"},
{icon:"🤝",name:"Preuve de Livraison",sub:"LIVRAISON",color:"#22C55E",caption:"Dernier kilomètre suivi GPS. Le client signe. POD généré avec signature, horodatage et coordonnées. Job livré.",bg:"081A0E"},
{icon:"⭐",name:"Clôture & Évaluation",sub:"TERMINÉ",color:"#22C55E",caption:"Job clôturé. Coût de non-qualité calculé. Le client note le service. Traçabilité bout-en-bout préservée — à jamais.",bg:"081A0E"},
];

let current=-1,playing=false,timer=null;
const DUR=7060;
const sceneEl=document.getElementById('scene');
const dotsEl=document.getElementById('dots');
const progEl=document.getElementById('progressBar');
const playBtn=document.getElementById('playBtn');

// Build dots
SCENES.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot';
  d.style.width='6px';d.style.background='#ffffff15';
  dotsEl.appendChild(d);
});

function render(){
  const dots=dotsEl.children;
  for(let i=0;i<SCENES.length;i++){
    dots[i].style.width=i===current?'20px':'6px';
    dots[i].style.background=i<=current?SCENES[i].color:'#ffffff15';
  }
  progEl.style.width=current>=0?((current+1)/SCENES.length*100)+'%':'0%';
  progEl.style.background=current>=0?SCENES[current].color:'#F5A800';

  if(current<0){
    sceneEl.innerHTML=`<div style="text-align:center"><div style="font-size:72px;margin-bottom:20px">🌍</div><div style="font-size:min(36px,7vw);font-weight:900;color:#fff">Workflow Global LSCM</div><div style="color:#666;font-size:16px;margin-top:10px">Appuyez sur Play pour le parcours de 2 minutes</div></div>`;
    document.body.style.background='#07080C';
    return;
  }
  const s=SCENES[current];
  document.body.style.background='#'+s.bg;
  let html='';
  if(s.gl) html+=`<div class="gl-badge fade-in">${s.main?'⚡ GREEN LIGHT — MANDATORY GATE':'🔒 GREEN LIGHT REQUIRED'}</div>`;
  html+=`<div class="scene-icon">${s.icon}</div>`;
  html+=`<div class="scene-sub fade-in-d1" style="color:${s.color}">${s.sub}</div>`;
  html+=`<div class="scene-name fade-in-d2 ${s.main?'main-name':''}" style="color:${s.main?'#EF4444':'#fff'}">${s.name}</div>`;
  html+=`<p class="scene-caption fade-in-d3">${s.caption}</p>`;
  html+=`<div class="scene-count fade-in-d3">${current+1} / ${SCENES.length}</div>`;
  sceneEl.innerHTML=html;
}

function advance(){
  if(current>=SCENES.length-1){playing=false;playBtn.textContent='↻ Rejouer';return;}
  current++;
  render();
  timer=setTimeout(advance,DUR);
}

function startPlay(){
  clearTimeout(timer);
  current=-1;playing=true;
  playBtn.textContent='En cours...';
  setTimeout(()=>{advance();},500);
}

render();
</script>
</body>
</html>
